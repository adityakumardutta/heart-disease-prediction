services:
  - type: web
    name: heart-disease-prediction
    env: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
